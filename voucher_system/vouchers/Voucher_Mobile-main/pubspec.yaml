name: voucher_appcd 
description: Voucher approval mobile app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  flutter_pdfview: ^1.3.2
  photo_view: ^0.14.0
  intl: ^0.19.0
  url_launcher: ^6.2.4
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1   

flutter:
  uses-material-design: true


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"