<!-- USER RIGHTS & PERMISSIONS MODAL -->
<style>
    #userRightsModal .perm-card {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #e9ecef;
        transition: box-shadow 0.2s;
    }
    #userRightsModal .perm-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

    #userRightsModal .perm-card-header {
        background: #f8f9fa;
        padding: 12px 16px;
        border-bottom: 1px solid #e9ecef;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    #userRightsModal .avatar-initial {
        width: 36px; height: 36px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
    }

    #userRightsModal .perm-section {
        border-right: 1px solid #e9ecef;
        min-width: 0;
    }
    #userRightsModal .perm-section:last-child { border-right: none; }

    #userRightsModal .perm-section-header {
        padding: 8px 14px;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 6px;
        border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    #userRightsModal .perm-section-voucher  { background: rgba(13,110,253,0.08); color: #0a58ca; border-bottom-color: rgba(13,110,253,0.15); }
    #userRightsModal .perm-section-function { background: rgba(25,135,84,0.08);  color: #0a6640; border-bottom-color: rgba(25,135,84,0.15); }
    #userRightsModal .perm-section-holiday  { background: rgba(13,202,240,0.08); color: #087990; border-bottom-color: rgba(13,202,240,0.15); }

    #userRightsModal .perm-list { padding: 10px 14px; }

    #userRightsModal .perm-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 0;
        border-bottom: 1px solid #f1f3f5;
    }
    #userRightsModal .perm-item:last-child { border-bottom: none; }

    #userRightsModal .perm-label {
        font-size: 0.82rem;
        color: #495057;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    #userRightsModal .perm-label i { font-size: 0.75rem; opacity: 0.6; }

    #userRightsModal .permission-switch {
        cursor: pointer;
        width: 2.2em;
        height: 1.2em;
    }

    #userRightsModal .flash-card {
        animation: flashGreen 0.8s ease forwards;
    }
    @keyframes flashGreen {
        0%   { background-color: #d1e7dd; }
        100% { background-color: transparent; }
    }

    #userRightsModal .perm-cols {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
    }

    @media (max-width: 768px) {
        #userRightsModal .perm-cols { grid-template-columns: 1fr; }
        #userRightsModal .perm-section { border-right: none; border-bottom: 1px solid #e9ecef; }
        #userRightsModal .perm-section:last-child { border-bottom: none; }
    }
</style>

<div class="modal fade" id="userRightsModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg">

            <div class="modal-header border-bottom pb-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-primary bg-opacity-10 rounded-3 p-2">
                        <i class="bi bi-shield-lock text-primary fs-4"></i>
                    </div>
                    <div>
                        <h5 class="modal-title fw-bold mb-0">User Rights &amp; Permissions</h5>
                        <p class="text-muted mb-0" style="font-size:0.78rem;">
                            Toggle switches to grant or revoke access. Changes save automatically.
                        </p>
                    </div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body p-3" style="background:#f8f9fa;">

                <!-- Loading -->
                <div id="userRightsLoading" class="text-center py-5" aria-live="polite">
                    <div class="spinner-border text-primary">
                        <span class="visually-hidden">Loading…</span>
                    </div>
                    <p class="text-muted mt-3 mb-0">Loading user permissions…</p>
                </div>

                <!-- Cards container -->
                <div id="userRightsContent" style="display:none;">
                    <div id="userRightsCards" class="d-flex flex-column gap-3"></div>
                </div>

                <!-- Error -->
                <div id="userRightsError" class="text-center py-5" style="display:none;">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size:2.5rem;"></i>
                    <p class="text-danger mt-3 mb-2" id="userRightsErrorMessage"></p>
                    <button class="btn btn-outline-danger btn-sm" onclick="loadUserRights()">
                        <i class="bi bi-arrow-clockwise me-1"></i>Retry
                    </button>
                </div>

            </div>

            <div class="modal-footer bg-white border-top pt-3">
                <small class="text-muted me-auto">
                    <i class="bi bi-check-circle text-success me-1"></i>Changes are saved automatically
                </small>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>

        </div>
    </div>
</div>

<script>
globalThis.CURRENT_USER_ID = "{{ user.id }}";

function loadUserRights() {
    const loading = document.getElementById('userRightsLoading');
    const content = document.getElementById('userRightsContent');
    const error   = document.getElementById('userRightsError');

    loading.style.display = 'block';
    content.style.display = 'none';
    error.style.display   = 'none';

    fetch('/api/user-rights/', {
        headers: { 'X-CSRFToken': globalThis.csrfToken || document.querySelector('[name=csrfmiddlewaretoken]')?.value || '' }
    })
    .then(r => { if (!r.ok) { throw new Error('HTTP ' + r.status); } return r.json(); })
    .then(data => {
        renderUserRightsCards(data.users);
        loading.style.display = 'none';
        content.style.display = 'block';
    })
    .catch(err => {
        loading.style.display = 'none';
        error.style.display   = 'block';
        document.getElementById('userRightsErrorMessage').textContent = 'Failed to load: ' + err.message;
    });
}

function getAvatarColor(group) {
    if (group === 'Admin Staff') return { bg: '#cfe2ff', text: '#0a58ca' };
    if (group === 'Accountants') return { bg: '#d1e7dd', text: '#0f5132' };
    return { bg: '#e2e3e5', text: '#41464b' };
}

function getGroupBadge(group) {
    if (group === 'Admin Staff') return 'primary';
    if (group === 'Accountants') return 'success';
    return 'secondary';
}

const PERM_GROUPS = [
    {
        key:   'voucher',
        label: 'Voucher',
        icon:  'bi-receipt',
        perms: [
            { key: 'can_create_voucher',      label: 'Create',      icon: 'bi-plus-circle' },
            { key: 'can_edit_voucher',        label: 'Edit',        icon: 'bi-pencil' },
            { key: 'can_view_voucher_list',   label: 'View List',   icon: 'bi-list-ul' },
            { key: 'can_view_voucher_detail', label: 'View Detail', icon: 'bi-eye' },
            { key: 'can_print_voucher',       label: 'Print',       icon: 'bi-printer' },
        ]
    },
    {
        key:   'function',
        label: 'Function',
        icon:  'bi-calendar-event',
        perms: [
            { key: 'can_create_function',      label: 'Create',      icon: 'bi-plus-circle' },
            { key: 'can_edit_function',        label: 'Edit',        icon: 'bi-pencil' },
            { key: 'can_delete_function',      label: 'Delete',      icon: 'bi-trash' },
            { key: 'can_view_function_list',   label: 'View List',   icon: 'bi-list-ul' },
            { key: 'can_view_function_detail', label: 'View Detail', icon: 'bi-eye' },
            { key: 'can_print_function',       label: 'Print',       icon: 'bi-printer' },
        ]
    },
    {
        key:   'holiday',
        label: 'Holiday',
        icon:  'bi-bus-front',
        perms: [
            { key: 'can_create_holiday',      label: 'Create',      icon: 'bi-plus-circle' },
            { key: 'can_edit_holiday',        label: 'Edit',        icon: 'bi-pencil' },
            { key: 'can_delete_holiday',      label: 'Delete',      icon: 'bi-trash' },
            { key: 'can_view_holiday_list',   label: 'View List',   icon: 'bi-list-ul' },
            { key: 'can_view_holiday_detail', label: 'View Detail', icon: 'bi-eye' },
        ]
    }
];

function renderUserRightsCards(users) {
    const container = document.getElementById('userRightsCards');
    container.innerHTML = '';

    if (!users || users.length === 0) {
        container.innerHTML = '<div class="text-center text-muted py-4">No users found</div>';
        return;
    }

    users.forEach(user => {
        const isCurrentUser = String(user.id) === String(globalThis.CURRENT_USER_ID);
        const avatar = getAvatarColor(user.group);
        const initial = escapeHtml(user.username.charAt(0).toUpperCase());

        // Build permission columns
        const colsHTML = PERM_GROUPS.map(group => `
            <div class="perm-section">
                <div class="perm-section-header perm-section-${group.key}">
                    <i class="bi ${group.icon}"></i>${group.label}
                </div>
                <div class="perm-list">
                    ${group.perms.map(p => `
                        <div class="perm-item">
                            <span class="perm-label">
                                <i class="bi ${p.icon}"></i>${p.label}
                            </span>
                            <div class="form-check form-switch m-0 p-0">
                                <input class="form-check-input permission-checkbox permission-switch"
                                       type="checkbox"
                                       role="switch"
                                       data-user-id="${user.id}"
                                       data-permission="${p.key}"
                                       ${user.permissions[p.key] ? 'checked' : ''}>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');

        const card = document.createElement('div');
        card.className = 'perm-card bg-white';
        card.dataset.userCardId = user.id;
        card.innerHTML = `
            <div class="perm-card-header">
                <div class="avatar-initial" style="background:${avatar.bg}; color:${avatar.text};">${initial}</div>
                <div class="flex-grow-1">
                    <div class="fw-semibold lh-1">
                        ${escapeHtml(user.username)}
                        ${isCurrentUser ? '<span class="badge bg-info-subtle text-info border border-info-subtle ms-1" style="font-size:0.65rem;">You</span>' : ''}
                    </div>
                    <div class="d-flex align-items-center gap-2 mt-1">
                        <span class="badge bg-${getGroupBadge(user.group)} bg-opacity-75" style="font-size:0.7rem;">${escapeHtml(user.group)}</span>
                        ${user.designation && user.designation !== 'N/A'
                            ? `<span class="text-muted" style="font-size:0.75rem;"><i class="bi bi-briefcase me-1"></i>${escapeHtml(user.designation)}</span>`
                            : ''}
                    </div>
                </div>
            </div>
            <div class="perm-cols">${colsHTML}</div>
        `;

        container.appendChild(card);
    });

    document.querySelectorAll('.permission-checkbox').forEach(cb => {
        cb.addEventListener('change', handlePermissionChange);
    });
}

function handlePermissionChange(event) {
    const checkbox  = event.target;
    const userId    = checkbox.dataset.userId;
    const isChecked = checkbox.checked;

    checkbox.disabled = true;

    const permissions = {};
    document.querySelectorAll(`.permission-checkbox[data-user-id="${userId}"]`).forEach(cb => {
        permissions[cb.dataset.permission] = cb.checked;
    });

    fetch('/api/user-rights/update/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': globalThis.csrfToken || document.querySelector('[name=csrfmiddlewaretoken]')?.value || ''
        },
        body: JSON.stringify({ user_id: userId, permissions })
    })
    .then(r => { if (!r.ok) { throw new Error('HTTP ' + r.status); } return r.json(); })
    .then(() => {
        checkbox.disabled = false;
        const card = checkbox.closest('[data-user-card-id]');
        if (card) {
            card.classList.add('flash-card');
            setTimeout(() => card.classList.remove('flash-card'), 800);
        }
    })
    .catch(err => {
        checkbox.checked  = !isChecked;
        checkbox.disabled = false;
        alert('Failed to update permission: ' + err.message);
    });
}

document.addEventListener('DOMContentLoaded', function () {
    const modal = document.getElementById('userRightsModal');
    if (modal) modal.addEventListener('show.bs.modal', loadUserRights);
});
</script>
